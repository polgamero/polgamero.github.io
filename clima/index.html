<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Overlay Clima</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
<video autoplay muted loop id="bgVideo">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-city-traffic-at-night-1070-large.mp4" type="video/mp4">
    </video>
<div id="weatherOverlay">

    <!-- CLOCK -->
    <div class="clockBox">
        <span id="clock">00:00</span>
    </div>

    <!-- WEATHER -->
    <div class="weatherBox">

        <!-- Loader -->
        <div id="loader" class="loader"></div>

        <!-- Weather content -->
        <div id="weatherContent" class="weatherContent">

            <div id="weatherIcon"></div>

            <span id="temperature"></span>

            <span class="divider">|</span>

            <div class="cityContainer"></div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
