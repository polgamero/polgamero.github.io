<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Overlay Clima</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="video-background">
<iframe width="560" height="315" src="https://www.youtube.com/embed/mtqyccMTGV0?si=BUEincnB8M6lquDv&amp;autoplay=1&mute=1&controls=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</div>
        
<div id="weatherOverlay">

    <!-- CLOCK -->
    <div class="clockBox">
        <span id="clock">00:00</span>
    </div>

    <!-- WEATHER -->
    <div class="weatherBox">

        <!-- Loader -->
        <div id="loader" class="loader"></div>

        <!-- Weather content -->
        <div id="weatherContent" class="weatherContent">

            <div id="weatherIcon"></div>

            <span id="temperature"></span>

            <span class="divider">|</span>

            <div class="cityContainer"></div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
