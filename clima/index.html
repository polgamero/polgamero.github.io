<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Overlay Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="logoContainer">
        <div id="octogonoBg"></div>
        <img src="logoFogon2026.png" id="mainLogo" class="logo-3d" alt="Logo">
    </div>

    <div id="weatherOverlay">
        <div class="clockBox" id="btnCambiarTexto" title="Clic para cambiar texto del banner">
            <span id="clock">00:00</span>
        </div>

        <div class="weatherBox" id="btnToggleBanner" title="Clic para mostrar/ocultar banner">
            <div id="loader" class="loader"></div>

            <div id="weatherContent" class="weatherContent">
                <div id="weatherIcon"></div>
                <span id="temperature"></span>
                <span class="divider">|</span>
                <div class="cityContainer"></div>
            </div>
        </div>
    </div>

    <div id="horizontalBanner" class="banner-hidden">
        <div class="banner-border-dots"></div>
        <div class="banner-badge">
            <span>@ELFOGONACUSTICOS</span>
        </div>
        <div class="banner-text-container">
            <span id="bannerText">¡BIENVENIDOS A EL FOGÓN ACÚSTICOS 2026!</span>
        </div>
    </div>

<script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
